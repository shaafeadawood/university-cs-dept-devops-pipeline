# GitHub Actions CI Pipeline - Production Environment
# Branch: main
# Triggers on every push to the main branch
# Strict validation and security checks for production deployments

name: CI - Production Environment

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-and-validate-prod:
    name: Build & Validate - Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Strict HTML validation for production
      - name: Validate HTML Files - Production Standard
        run: |
          echo "=== PRODUCTION: Strict HTML Validation ==="
          VALIDATION_ERRORS=0

          for file in pages/*.html; do
            if [ -f "$file" ]; then
              echo "[PROD-CHECK] Validating: $file"
              
              # Strict DOCTYPE check
              if ! grep -q "<!DOCTYPE html>" "$file"; then
                echo "  ✗ CRITICAL: Missing DOCTYPE - Production standard violation"
                ((VALIDATION_ERRORS++))
              fi
              
              # Strict HTML5 structure
              if ! grep -q "<html" "$file"; then
                echo "  ✗ CRITICAL: Missing html tag"
                ((VALIDATION_ERRORS++))
              fi
              
              if ! grep -q "<head>" "$file"; then
                echo "  ✗ CRITICAL: Missing head section"
                ((VALIDATION_ERRORS++))
              fi
              
              if ! grep -q "<title>" "$file"; then
                echo "  ✗ CRITICAL: Missing page title"
                ((VALIDATION_ERRORS++))
              fi
              
              if ! grep -q "<body>" "$file"; then
                echo "  ✗ CRITICAL: Missing body tag"
                ((VALIDATION_ERRORS++))
              fi
              
              # Mandatory meta tags for production
              if ! grep -q "charset" "$file"; then
                echo "  ✗ ERROR: Missing charset meta tag - REQUIRED for production"
                ((VALIDATION_ERRORS++))
              fi
              
              if ! grep -q "viewport" "$file"; then
                echo "  ✗ ERROR: Missing viewport meta tag - REQUIRED for production"
                ((VALIDATION_ERRORS++))
              fi
              
              # Security: Check for proper HTML structure
              if grep -q "<script" "$file"; then
                echo "  ⚠ INFO: Script tags detected"
              fi
              
              [ $VALIDATION_ERRORS -eq 0 ] && echo "  ✓ PASS"
            fi
          done

          if [ $VALIDATION_ERRORS -gt 0 ]; then
            echo ""
            echo "❌ PRODUCTION HTML VALIDATION FAILED with $VALIDATION_ERRORS errors"
            exit 1
          fi
          echo "✓✓✓ PRODUCTION HTML VALIDATION PASSED ✓✓✓"

      # Step 3: Strict CSS validation for production
      - name: Validate CSS Files - Production Standard
        run: |
          echo "=== PRODUCTION: Strict CSS Validation ==="
          CSS_FILE="assets/css/style.css"
          VALIDATION_ERRORS=0

          if [ ! -f "$CSS_FILE" ]; then
            echo "❌ CRITICAL: CSS file not found: $CSS_FILE"
            exit 1
          fi

          # File size validation
          FILE_SIZE=$(wc -c < "$CSS_FILE")
          echo "File size: $FILE_SIZE bytes"

          if [ $FILE_SIZE -eq 0 ]; then
            echo "❌ CRITICAL: CSS file is empty"
            ((VALIDATION_ERRORS++))
          fi

          # CSS syntax validation
          if ! grep -q "{" "$CSS_FILE"; then
            echo "❌ CRITICAL: No CSS rules found"
            ((VALIDATION_ERRORS++))
          fi

          if ! grep -q "}" "$CSS_FILE"; then
            echo "❌ CRITICAL: CSS syntax error - unmatched braces"
            ((VALIDATION_ERRORS++))
          fi

          # Brace matching validation
          OPEN_BRACES=$(grep -o "{" "$CSS_FILE" | wc -l)
          CLOSE_BRACES=$(grep -o "}" "$CSS_FILE" | wc -l)

          if [ $OPEN_BRACES -ne $CLOSE_BRACES ]; then
            echo "❌ CRITICAL: Unmatched CSS braces (open: $OPEN_BRACES, close: $CLOSE_BRACES)"
            ((VALIDATION_ERRORS++))
          fi

          # Design tokens check
          if grep -q ":root" "$CSS_FILE"; then
            echo "✓ Design tokens (CSS variables) found"
          fi

          # Media query check for responsive design
          if grep -q "@media" "$CSS_FILE"; then
            echo "✓ Responsive design (media queries) found"
          fi

          if [ $VALIDATION_ERRORS -gt 0 ]; then
            echo "❌ PRODUCTION CSS VALIDATION FAILED"
            exit 1
          fi

          echo "✓✓✓ PRODUCTION CSS VALIDATION PASSED ✓✓✓"

      # Step 4: Build production Docker image using plain `docker build` for reliability
      - name: Build Docker Image (prod)
        run: |
          echo "=== Building Docker image (Production) ==="
          docker --version || true
          if [ ! -f Dockerfile ]; then echo "✗ ERROR: Dockerfile missing at repo root" && exit 1; fi
          docker build -f Dockerfile -t university-cs-dept-portal:prod-${{ github.sha }} .
          docker tag university-cs-dept-portal:prod-${{ github.sha }} university-cs-dept-portal:prod-latest
          docker tag university-cs-dept-portal:prod-${{ github.sha }} university-cs-dept-portal:v1.0.0

      # Step 5: Enterprise-grade build verification
      - name: Verify Build Success - Production
        run: |
          echo "=== PRODUCTION: Build Verification ==="
          docker image ls --format '{{.Repository}}:{{.Tag}}' | grep '^university-cs-dept-portal:' || (echo "❌ CRITICAL: Docker images not found" && exit 1)
          if [ ! -f "docker/Dockerfile" ]; then
            echo "❌ CRITICAL: Dockerfile not found"
            exit 1
          fi
          echo "✓ Dockerfile verified"
          echo "✓ Production CI/CD VALIDATION PASSED"
