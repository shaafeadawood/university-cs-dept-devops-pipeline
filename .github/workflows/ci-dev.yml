# GitHub Actions CI Pipeline - Development Environment
# Branch: develop
# Triggers on every push to the develop branch
# Validates HTML/CSS and builds Docker image for development

name: CI - Development Environment

on:
  push:
    branches:
      - develop

jobs:
  # CI Job: Validate and build for development environment
  build-and-validate:
    name: Build & Validate - Dev
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js for CSS/HTML validation tools
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3: Install validation tools
      - name: Install Validation Tools
        run: |
          npm install -g stylelint
          npm install -g html-validator-cli

      # Step 4: Validate HTML files
      - name: Validate HTML Files
        run: |
          echo "Validating HTML files in pages directory..."
          for file in pages/*.html; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              # Basic HTML validation - check for required elements
              grep -q "<!DOCTYPE html>" "$file" || (echo "ERROR: Missing DOCTYPE in $file" && exit 1)
              grep -q "<html" "$file" || (echo "ERROR: Missing html tag in $file" && exit 1)
              grep -q "<body>" "$file" || (echo "ERROR: Missing body tag in $file" && exit 1)
            fi
          done
          echo "✓ HTML validation completed"

      # Step 5: Validate CSS files
      - name: Validate CSS Files
        run: |
          echo "Validating CSS files..."
          if [ -f "assets/css/style.css" ]; then
            echo "Checking: assets/css/style.css"
            # Basic CSS validation - check file exists and is not empty
            if [ ! -s "assets/css/style.css" ]; then
              echo "ERROR: CSS file is empty"
              exit 1
            fi
            # Check for valid CSS syntax markers
            grep -q "{" "assets/css/style.css" || (echo "ERROR: Invalid CSS syntax" && exit 1)
            echo "✓ CSS validation completed"
          fi

      # Step 6: Set up Docker buildx for multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 7: Build Docker image for development
      - name: Build Docker Image
        run: |
          echo "Building Docker image for development..."
          docker build -f docker/Dockerfile -t university-cs-dept-portal:dev-${{ github.sha }} .
          docker build -f docker/Dockerfile -t university-cs-dept-portal:dev-latest .

      # Step 8: Verify Docker image build success
      - name: Verify Build Success
        run: |
          echo "Verifying Docker image..."
          docker images | grep university-cs-dept-portal
          echo "✓ Docker image built successfully"
          echo "Images:"
          docker image ls university-cs-dept-portal --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
