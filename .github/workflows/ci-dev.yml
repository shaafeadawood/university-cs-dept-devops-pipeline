# GitHub Actions CI Pipeline - Development Environment
# Branch: develop
# Triggers on every push to the develop branch
# Lightweight validation and Docker build for development

name: CI - Development Environment

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-and-validate:
    name: Build & Validate - Dev
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Validate HTML files
      - name: Validate HTML Files
        run: |
          echo "=== Validating HTML files (Development) ==="
          for file in pages/*.html; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              grep -q "<!DOCTYPE html>" "$file" || (echo "✗ ERROR: Missing DOCTYPE in $file" && exit 1)
              grep -q "<html" "$file" || (echo "✗ ERROR: Missing html tag in $file" && exit 1)
              grep -q "<body>" "$file" || (echo "✗ ERROR: Missing body tag in $file" && exit 1)
              echo "  ✓ PASS"
            fi
          done
          echo "✓ HTML validation completed successfully"

      # Step 3: Validate CSS files
      - name: Validate CSS Files
        run: |
          echo "=== Validating CSS files (Development) ==="
          CSS_FILE="assets/css/style.css"
          if [ ! -f "$CSS_FILE" ]; then
            echo "✗ ERROR: CSS file not found: $CSS_FILE"
            exit 1
          fi

          if [ ! -s "$CSS_FILE" ]; then
            echo "✗ ERROR: CSS file is empty"
            exit 1
          fi

          grep -q "{" "$CSS_FILE" || (echo "✗ ERROR: Invalid CSS syntax - no opening braces" && exit 1)
          echo "✓ CSS validation completed successfully"

      # Step 4: Build Docker image using plain `docker build` for reliability
      # Use repository root as context and explicit Dockerfile path.
      - name: Build Docker Image (dev)
        run: |
          echo "=== Building Docker image (Development) ==="
          docker --version || true
          docker build -f docker/Dockerfile -t university-cs-dept-portal:dev-${{ github.sha }} .
          docker tag university-cs-dept-portal:dev-${{ github.sha }} university-cs-dept-portal:dev-latest

      # Step 5: Verify build success
      - name: Verify Build Success
        run: |
          echo "=== Verifying Build (Development) ==="
          docker image ls --format '{{.Repository}}:{{.Tag}}' | grep '^university-cs-dept-portal:' || (echo "✗ ERROR: Image not found" && exit 1)
          echo "✓ Development CI Pipeline PASSED"
