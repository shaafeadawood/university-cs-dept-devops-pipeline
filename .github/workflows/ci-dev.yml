name: CI - Development

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  validate-and-build:
    name: Validate & Build - Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate HTML Files
        run: |
          echo "=== Validating HTML files ==="
          for file in pages/*.html; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              grep -q "<!DOCTYPE html>" "$file" || (echo "❌ ERROR: Missing DOCTYPE in $file" && exit 1)
              grep -q "<html" "$file" || (echo "❌ ERROR: Missing html tag in $file" && exit 1)
              grep -q "<body>" "$file" || (echo "❌ ERROR: Missing body tag in $file" && exit 1)
              echo "✅ PASS: $file"
            fi
          done
          echo "✅ HTML validation completed"

      - name: Validate CSS Files
        run: |
          echo "=== Validating CSS files ==="
          CSS_FILE="assets/css/style.css"
          if [ ! -f "$CSS_FILE" ]; then
            echo "❌ ERROR: CSS file not found: $CSS_FILE"
            exit 1
          fi
          if [ ! -s "$CSS_FILE" ]; then
            echo "❌ ERROR: CSS file is empty"
            exit 1
          fi
          grep -q "{" "$CSS_FILE" || (echo "❌ ERROR: Invalid CSS syntax - no opening braces" && exit 1)
          grep -q "}" "$CSS_FILE" || (echo "❌ ERROR: Invalid CSS syntax - no closing braces" && exit 1)
          echo "✅ CSS validation completed"

      - name: Verify Dockerfile
        run: |
          echo "=== Verifying Dockerfile ==="
          if [ ! -f "Dockerfile" ]; then
            echo "❌ ERROR: Dockerfile not found at repository root"
            exit 1
          fi
          echo "✅ Dockerfile found"

      - name: Build Docker Image
        run: |
          echo "=== Building Docker image ==="
          docker build -t university-cs-dept-portal:dev-build .
          echo "✅ Docker build completed"

      - name: Verify Docker Build Success
        run: |
          echo "=== Verifying Docker build ==="
          docker image inspect university-cs-dept-portal:dev-build > /dev/null 2>&1 || (echo "❌ ERROR: Docker image not found" && exit 1)
          echo "✅ Development CI pipeline completed successfully"
