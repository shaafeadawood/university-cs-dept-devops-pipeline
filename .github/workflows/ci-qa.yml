name: CI - QA/Staging

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  validate-and-build:
    name: Validate & Build - QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate HTML Files
        run: |
          echo "=== Validating HTML files (QA) ==="
          VALIDATION_ERRORS=0
          for file in pages/*.html; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              grep -q "<!DOCTYPE html>" "$file" || { echo "❌ Missing DOCTYPE"; ((VALIDATION_ERRORS++)); }
              grep -q "<html" "$file" || { echo "❌ Missing html tag"; ((VALIDATION_ERRORS++)); }
              grep -q "<head>" "$file" || { echo "❌ Missing head section"; ((VALIDATION_ERRORS++)); }
              grep -q "<title>" "$file" || { echo "❌ Missing title"; ((VALIDATION_ERRORS++)); }
              grep -q "<body>" "$file" || { echo "❌ Missing body tag"; ((VALIDATION_ERRORS++)); }
              [ $VALIDATION_ERRORS -eq 0 ] && echo "✅ PASS: $file"
            fi
          done
          if [ $VALIDATION_ERRORS -gt 0 ]; then
            echo "❌ HTML Validation FAILED"
            exit 1
          fi
          echo "✅ All HTML files validated"

      - name: Validate CSS Files
        run: |
          echo "=== Validating CSS files (QA) ==="
          CSS_FILE="assets/css/style.css"
          if [ ! -f "$CSS_FILE" ]; then
            echo "❌ ERROR: CSS file not found: $CSS_FILE"
            exit 1
          fi
          FILE_SIZE=$(wc -c < "$CSS_FILE")
          if [ $FILE_SIZE -eq 0 ]; then
            echo "❌ ERROR: CSS file is empty"
            exit 1
          fi
          grep -q "{" "$CSS_FILE" || { echo "❌ ERROR: No CSS rules found"; exit 1; }
          grep -q "}" "$CSS_FILE" || { echo "❌ ERROR: Unmatched braces"; exit 1; }
          UNCLOSED=$(grep -o "{" "$CSS_FILE" | wc -l)
          CLOSED=$(grep -o "}" "$CSS_FILE" | wc -l)
          if [ $UNCLOSED -ne $CLOSED ]; then
            echo "❌ ERROR: Unmatched CSS braces (open: $UNCLOSED, close: $CLOSED)"
            exit 1
          fi
          echo "✅ CSS validation completed"

      - name: Verify Dockerfile
        run: |
          echo "=== Verifying Dockerfile ==="
          if [ ! -f "Dockerfile" ]; then
            echo "❌ ERROR: Dockerfile not found at repository root"
            exit 1
          fi
          echo "✅ Dockerfile found"

      - name: Build Docker Image
        run: |
          echo "=== Building Docker image ==="
          docker build -t university-cs-dept-portal:qa-build .
          echo "✅ Docker build completed"

      - name: Verify Docker Build Success
        run: |
          echo "=== Verifying Docker build ==="
          docker image inspect university-cs-dept-portal:qa-build > /dev/null 2>&1 || (echo "❌ ERROR: Docker image not found" && exit 1)
          echo "✅ QA CI pipeline completed successfully"
