name: CD - Development

# Trigger: pushes to the develop branch
on:
  push:
    branches:
      - develop

jobs:
  deploy-development:
    name: Deploy → Development (Render)
    runs-on: ubuntu-latest
    environment: development

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Build Docker image locally (ensures Dockerfile is valid)
      - name: Verify root Dockerfile and Build Docker Image
        run: |
          echo "Building Docker image for Development (validate root Dockerfile)"
          if [ ! -f Dockerfile ]; then echo "✗ ERROR: Dockerfile missing at repo root" && exit 1; fi
          docker --version || true
          docker build -f Dockerfile -t university-cs-dept-portal:dev-${{ github.sha }} .

      # Trigger a Render deploy via API. Requires secrets: RENDER_API_KEY, RENDER_SERVICE_ID_DEV
      - name: Trigger Render Deploy (Development)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_DEV }}
        run: |
          echo "Triggering Render deploy for service: $SERVICE_ID"
          HTTP_CODE=$(curl -s -o /tmp/render_resp -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "Render API HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Render deploy failed. Response:"; cat /tmp/render_resp
            exit 1
          fi

          echo "Render deploy triggered successfully"
