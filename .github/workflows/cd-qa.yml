name: CD - QA/Staging

# Trigger: pushes to the release branch
on:
  push:
    branches:
      - release

jobs:
  deploy-qa:
    name: Deploy → QA (Render)
    runs-on: ubuntu-latest
    environment: QA

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "Building Docker image for QA"
          docker --version || true
          docker build -f docker/Dockerfile -t university-cs-dept-portal:qa-${{ github.sha }} .

      - name: Trigger Render Deploy (QA)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_QA }}
        run: |
          echo "Triggering Render deploy for service: $SERVICE_ID"
          HTTP_CODE=$(curl -s -o /tmp/render_resp -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "Render API HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Render deploy failed. Response:"; cat /tmp/render_resp
            exit 1
          fi

          echo "Render deploy triggered successfully"
