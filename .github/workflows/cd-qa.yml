name: CD - QA

on:
  workflow_run:
    workflows:
      - CI - QA
    types:
      - completed
    branches:
      - release

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Deploy → QA (Render)
    runs-on: ubuntu-latest
    environment: QA

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Show Upstream CI Metadata
        run: |
          echo "Upstream workflow: ${{ github.event.workflow_run.name }}"
          echo "Upstream branch:   ${{ github.event.workflow_run.head_branch }}"
          echo "Upstream SHA:      ${{ github.event.workflow_run.head_sha }}"
          echo "Upstream result:   ${{ github.event.workflow_run.conclusion }}"

      - name: Deploy to QA
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "=== Deploying to QA ==="
          
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "❌ ERROR: Missing required Render secrets"
            exit 1
          fi
          
          echo "Triggering Render deploy for service: $RENDER_SERVICE_ID"
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json")
          
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $RESPONSE_BODY"
          
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Render deployment failed"
            exit 1
          fi
          
          echo "✅ QA deployment triggered successfully"
